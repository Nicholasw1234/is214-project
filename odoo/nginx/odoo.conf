upstream odoo_cluster {
    # ip_hash ensures a user always hits the same node (required for Odoo sessions)
    ip_hash;

    server odoo1:8069 max_fails=3 fail_timeout=30s;
    server odoo2:8069 max_fails=3 fail_timeout=30s;
}

upstream odoo_longpolling {
    server odoo1:8072 max_fails=3 fail_timeout=30s;
    server odoo2:8072 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Pass real IP to Odoo nodes so they log correctly
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    # Proxy timeouts suitable for Odoo's longer operations
    proxy_connect_timeout   60s;
    proxy_send_timeout      300s;
    proxy_read_timeout      300s;

    # Buffer tuning
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           4 32k;
    proxy_busy_buffers_size 64k;

    location / {
        proxy_pass http://odoo_cluster;
    }

    # WebSocket support for Odoo (longpolling) — dedicated gevent port 8072
    location /longpolling {
        proxy_pass http://odoo_longpolling;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location = /favicon.ico {
        proxy_pass http://odoo_cluster;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        proxy_pass http://odoo_cluster;
        access_log off;
        log_not_found off;
    }

    location /nginx_status {
        stub_status on;
        allow 172.16.0.0/12;  # Docker network range
        deny all;
    }
}
