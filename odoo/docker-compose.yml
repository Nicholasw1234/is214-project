services:
  # ─── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-odoo}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-odoo} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (session & cache) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Odoo node 1 ─────────────────────────────────────────────────────────────
  odoo1:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8069"
      - "8072"
    environment:
      HOST: db
      PORT: 5432
      USER: ${DB_USER:-odoo}
      PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER:-odoo}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ODOO_DATABASE: ${ODOO_DATABASE:-odoo}
      ODOO_ADMIN_PASSWD: ${ODOO_ADMIN_PASSWD}
      ODOO_DB_FILTER: ${ODOO_DB_FILTER:-.*}
      WORKERS: 4
    volumes:
      # FIX: Each node needs its own filestore volume to prevent data corruption.
      # Use an S3-compatible attachment store (e.g. ir.attachment S3 module) for
      # true shared storage across nodes. For now, separate volumes are safe.
      - odoo_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Odoo node 2 ─────────────────────────────────────────────────────────────
  odoo2:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8069"
      - "8072"
    environment:
      HOST: db
      PORT: 5432
      USER: ${DB_USER:-odoo}
      PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER:-odoo}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ODOO_DATABASE: ${ODOO_DATABASE:-odoo}
      ODOO_ADMIN_PASSWD: ${ODOO_ADMIN_PASSWD}
      ODOO_DB_FILTER: ${ODOO_DB_FILTER:-.*}
      WORKERS: 4
    volumes:
      - odoo_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Nginx load balancer ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/odoo.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - odoo1
      - odoo2

  # ─── Certbot (TLS certificates) ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'

  # ─── Monitoring: exporters ────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: odoo-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - "9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: odoo-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    expose:
      - "8080"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: odoo-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-odoo}:${DB_PASSWORD}@db:5432/postgres?sslmode=disable"
    expose:
      - "9187"
    depends_on:
      db:
        condition: service_healthy

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: odoo-nginx-exporter
    restart: unless-stopped
    command:
      - '--nginx.scrape-uri=http://nginx/nginx_status'
    expose:
      - "9113"
    depends_on:
      - nginx

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: odoo-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy

  # ─── Monitoring: Prometheus ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: odoo-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    expose:
      - "9090"
    depends_on:
      - node-exporter
      - cadvisor
      - postgres-exporter
      - nginx-exporter
      - redis-exporter

  # ─── Monitoring: Grafana ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: odoo-grafana
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://is214g09t07mile3odooproductionvm.eastasia.cloudapp.azure.com/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=${GRAFANA_SMTP_USER}
      - GF_SMTP_PASSWORD=${GRAFANA_SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GRAFANA_SMTP_USER}
      - GF_SMTP_FROM_NAME=Grafana Odoo
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  # FIX: Separate filestore volumes per Odoo node
  odoo_data:
  prometheus_data:
  grafana_data:
  certbot_www:
  certbot_certs:
