services:

  # ─── Database ────────────────────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: moodle
      MARIADB_USER: moodle
      MARIADB_PASSWORD: moodlepassword
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-file-per-table=1
      --skip-log-bin
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (shared session + cache store) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Moodle node 1 ───────────────────────────────────────────────────────────
  moodle1:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html
      MOODLE_DB_TYPE: mariadb
      MOODLE_DB_HOST: db
      MOODLE_DB_PORT: 3306
      MOODLE_DB_NAME: moodle
      MOODLE_DB_USER: moodle
      MOODLE_DB_PASSWORD: moodlepassword
      MOODLE_WWWROOT: http://localhost
      MOODLE_DATAROOT: /var/moodledata
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - moodle_data:/var/www/html
      - moodledata:/var/moodledata
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Moodle node 2 ───────────────────────────────────────────────────────────
  moodle2:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html
      MOODLE_DB_TYPE: mariadb
      MOODLE_DB_HOST: db
      MOODLE_DB_PORT: 3306
      MOODLE_DB_NAME: moodle
      MOODLE_DB_USER: moodle
      MOODLE_DB_PASSWORD: moodlepassword
      MOODLE_WWWROOT: http://localhost
      MOODLE_DATAROOT: /var/moodledata
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - moodle_data:/var/www/html
      - moodledata:/var/moodledata
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Nginx load balancer ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/moodle.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - moodle1
      - moodle2

volumes:
  mariadb_data:
  redis_data:
  moodle_data:
  moodledata:
