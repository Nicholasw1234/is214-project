services:
  db:
    image: bitnami/mariadb:latest
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=rootpassword
      - MARIADB_DATABASE=moodle
      - MARIADB_USER=moodle
      - MARIADB_PASSWORD=bitnami
      - ALLOW_EMPTY_PASSWORD=yes
      - MARIADB_CHARACTER_SET=utf8mb4
      - MARIADB_COLLATE=utf8mb4_unicode_ci
    volumes:
      - mariadb_data:/bitnami/mariadb
    healthcheck:
      test: ["CMD", "/opt/bitnami/mariadb/bin/mysql", "-u", "moodle", "-pbitnami", "-e", "SELECT 1", "moodle"]
      interval: 10s
      timeout: 5s
      retries: 5

  moodle:
    image: docker.io/bitnamilegacy/moodle:4.1
    restart: always
    ports:
      - "8080:8080"
    environment:
      - MOODLE_DATABASE_HOST=db
      - MOODLE_DATABASE_PORT_NUMBER=3306
      - MOODLE_DATABASE_USER=moodle
      - MOODLE_DATABASE_PASSWORD=bitnami
      - MOODLE_DATABASE_NAME=moodle
      - MOODLE_DATABASE_TYPE=mariadb
      - MOODLE_USERNAME=admin
      - MOODLE_PASSWORD=adminpassword
      - MOODLE_SITE_URL=http://localhost:8080
      - MOODLE_EMAIL=admin@example.com
      - ALLOW_EMPTY_PASSWORD=yes
      - PHP_MEMORY_LIMIT=512M
      - LC_ALL=C.UTF-8
      - LANG=C.UTF-8
    volumes:
      - moodle_data:/bitnami/moodle
    depends_on:
      db:
        condition: service_healthy

volumes:
  mariadb_data:
    driver: local
  moodle_data:
    driver: local
