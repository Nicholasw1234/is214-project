services:
  # ─── Database ────────────────────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: moodle
      MARIADB_USER: moodle
      MARIADB_PASSWORD: ${DB_PASSWORD}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-file-per-table=1
      --skip-log-bin
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (shared session + cache store) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Moodle node 1 ───────────────────────────────────────────────────────────
  moodle1:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html
      MOODLE_DB_TYPE: mariadb
      MOODLE_DB_HOST: db
      MOODLE_DB_PORT: 3306
      MOODLE_DB_NAME: moodle
      MOODLE_DB_USER: moodle
      MOODLE_DB_PASSWORD: ${DB_PASSWORD}
      MOODLE_WWWROOT: ${MOODLE_WWWROOT}   # must be https://yourdomain.com
      MOODLE_DATAROOT: /var/moodledata
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - moodle_data:/var/www/html
      - moodledata:/var/moodledata
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Moodle node 2 ───────────────────────────────────────────────────────────
  moodle2:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html
      MOODLE_DB_TYPE: mariadb
      MOODLE_DB_HOST: db
      MOODLE_DB_PORT: 3306
      MOODLE_DB_NAME: moodle
      MOODLE_DB_USER: moodle
      MOODLE_DB_PASSWORD: ${DB_PASSWORD}
      MOODLE_WWWROOT: ${MOODLE_WWWROOT}   # must be https://yourdomain.com
      MOODLE_DATAROOT: /var/moodledata
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - moodle_data:/var/www/html
      - moodledata:/var/moodledata
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Nginx load balancer ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/moodle.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro          # ACME challenge files
      - certbot_certs:/etc/letsencrypt:ro        # TLS certificates
    depends_on:
      - moodle1
      - moodle2

  # ─── Certbot (initial issue + scheduled renewal) ─────────────────────────────
  # First run: `docker compose run --rm certbot` to obtain the certificate.
  # Renewal:   the container's CMD runs `renew` and then sleeps 12 h in a loop,
  #            so just keep it running alongside nginx.
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot          # written by certbot, read by nginx
      - certbot_certs:/etc/letsencrypt        # persistent cert storage
    # Loop: renew (no-op when cert is fresh) every 12 hours.
    # certbot renew uses the saved --webroot config from the first run.
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'
    depends_on:
      - nginx

  # ─── Monitoring: exporters ────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - "9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    expose:
      - "8080"

  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysqld-exporter
    restart: unless-stopped
    command:
      - "--config.my-cnf=/etc/mysql/my.cnf"
    volumes:
      - ./mysqld-exporter.cnf:/etc/mysql/my.cnf:ro
    expose:
      - "9104"
    depends_on:
      db:
        condition: service_healthy

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    restart: unless-stopped
    command:
      - '--nginx.scrape-uri=http://nginx/nginx_status'
    expose:
      - "9113"
    depends_on:
      - nginx

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy

  # ─── Monitoring: Prometheus ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    expose:
      - "9090"
    depends_on:
      - node-exporter
      - cadvisor
      - mysqld-exporter
      - nginx-exporter
      - redis-exporter

  # ─── Monitoring: Grafana ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    expose:
      - "3000"         # no longer publish directly on host
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://e08g09t07moodle-vm.koreacentral.cloudapp.azure.com/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=${GRAFANA_SMTP_USER}
      - GF_SMTP_PASSWORD=${GRAFANA_SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GRAFANA_SMTP_USER}
      - GF_SMTP_FROM_NAME=Moodle Alerts
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS
    depends_on:
      - prometheus

volumes:
  mariadb_data:
  redis_data:
  moodle_data:
  moodledata:
  prometheus_data:
  grafana_data:
  certbot_www:    # ACME challenge webroot
  certbot_certs:  # Let's Encrypt certs + account data
