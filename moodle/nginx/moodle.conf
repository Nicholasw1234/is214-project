upstream moodle_cluster {
    # ip_hash ensures a user always hits the same node (required for Moodle sessions
    # even when using Redis, to avoid race conditions on concurrent requests)
    ip_hash;

    server moodle1:80 max_fails=3 fail_timeout=30s;
    server moodle2:80 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 512M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Pass real IP to Moodle nodes so they log correctly
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    # Proxy timeouts suitable for Moodle's longer operations
    proxy_connect_timeout   60s;
    proxy_send_timeout      300s;
    proxy_read_timeout      300s;

    # Buffer tuning
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           4 32k;
    proxy_busy_buffers_size 64k;

    location / {
        proxy_pass http://moodle_cluster;
    }

    # Deny access to sensitive Moodle paths
    location ~* /(\.|vendor|node_modules|composer\.(json|lock)|package\.json) {
        deny all;
        return 404;
    }

    location = /favicon.ico {
        proxy_pass http://moodle_cluster;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        proxy_pass http://moodle_cluster;
        access_log off;
        log_not_found off;
    }
}
