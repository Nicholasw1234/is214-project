upstream moodle_cluster {
    # ip_hash ensures a user always hits the same node (required for Moodle sessions
    # even when using Redis, to avoid race conditions on concurrent requests)
    ip_hash;

    server moodle1:80 max_fails=3 fail_timeout=30s;
    server moodle2:80 max_fails=3 fail_timeout=30s;
}

# ── HTTP: ACME challenge passthrough + redirect everything else to HTTPS ────────
server {
    listen 80;
    server_name _;

    # Let Certbot's webroot plugin answer ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ── TLS ─────────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    # Mozilla "Intermediate" profile (TLS 1.2 + 1.3, broad compatibility)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── IP allowlist ─────────────────────────────────────────────────────────────
    allow 202.161.35.27/32;
    deny all;

    client_max_body_size 512M;

    # ── Security headers ─────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # ── Proxy headers ────────────────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  443;

    # ── Proxy timeouts ───────────────────────────────────────────────────────────
    proxy_connect_timeout   60s;
    proxy_send_timeout      300s;
    proxy_read_timeout      300s;

    # ── Buffer tuning ────────────────────────────────────────────────────────────
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           4 32k;
    proxy_busy_buffers_size 64k;

    location / {
        proxy_pass http://moodle_cluster;
    }

    # Deny access to sensitive Moodle paths
    location ~* /(\.|vendor|node_modules|composer\.(json|lock)|package\.json) {
        deny all;
        return 404;
    }

    location = /favicon.ico {
        proxy_pass http://moodle_cluster;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        proxy_pass http://moodle_cluster;
        access_log off;
        log_not_found off;
    }

    location /nginx_status {
        stub_status on;
        allow 172.0.0.0/8;  # Docker network
        deny all;
    }
}
